name: Build and Push dev-container

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/build-dev-container.yaml
      - tools/dev-container.dockerfile

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build-and-push:
    name: Build and Push dev-container
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Image
        id: image
        run: |
          echo "id=ghcr.io/${{ github.repository_owner }}/alloy-dev-container" >> "${GITHUB_OUTPUT}"
          echo "build-time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dev-container image
        id: push
        uses: docker/build-push-action@v6
        with:
          file: tools/dev-container.dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.id }}:ubuntu
            ${{ steps.image.outputs.id }}:ubuntu-24.04
            ${{ steps.image.outputs.id }}:ubuntu-24.04-${{ github.sha }}
          labels: |
            org.opencontainers.image.vendor=Alloy
            org.opencontainers.image.title=Alloy Development Container
            org.opencontainers.image.description=A development container for building Alloy
            org.opencontainers.image.licenses=MIT OR Apache-2.0
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.created=${{ steps.image.outputs.build-time }}

      - name: Attest Build Provenance
        id: attest
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ steps.image.outputs.id }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
          github-token: ${{ github.token }}
          show-summary: true
